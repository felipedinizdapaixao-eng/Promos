<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ======================================================= -->
    <!-- CONFIGURAÇÃO DO WHATASPP (META TAGS OPEN GRAPH)        -->
    <!-- ======================================================= -->
    <!-- ALTERE AQUI: O título que vai aparecer no card do WhatsApp -->
    <title>Oferta Especial no Mercado Livre</title>

    <meta property="og:description" content="Aproveite o Frete Grátis e desconto exclusivo por tempo limitado no Mercado Livre. Confira!">
    
    <!-- ALTERE AQUI: O link direto da imagem do produto (clique com o botão direito na foto no Mercado Livre e escolha 'Copiar endereço da imagem') -->
    <meta property="og:image" content="https://http2.mlstatic.com/D_NQ_NP_914532-MLA123456789_012026-O.webp">
    <meta property="og:image:type" content="image/webp">
    <meta property="og:image:width" content="300">

    <meta property="og:type" content="website">

    <!-- ======================================================= -->
    <!-- REDIRECIONAMENTO AUTOMÁTICO                             -->
    <!-- ======================================================= -->
    <!-- ALTERE AQUI: Substitua o URL= pelo seu LINK DE AFILIADO do Mercado Livre -->
    <meta http-equiv="refresh" content="0; url=https://meli.la/2qedWdQ">

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f7f7f7;
            color: #333;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        a {
            color: #3483fa;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Redirecionando para a oferta oficial no Mercado Livre...</h2>
        <!-- ALTERE AQUI: Substitua o href= pelo seu LINK DE AFILIADO também (caso o redirecionamento automático falhe) -->

    </div>

    <!-- Redirecionamento de segurança em JavaScript -->
    <script>
        // ALTERE AQUI: Substitua pelo seu LINK DE AFILIADO
        setTimeout(function() {
            window.location.href = "https://mercadolivre.com/sec/seu-link-de-afiliado-aqui";
        }, 100);
    </script>

</body>
